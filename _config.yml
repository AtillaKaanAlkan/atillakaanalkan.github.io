# =========================================================================
#  SITE SETTINGS  —  edit the values marked with TODO
# =========================================================================
title: "Your Name"
tagline: "Researcher in NLP & AI"
description: >-
  Personal website of Your Name — research, scientific publications,
  blog posts popularizing AI and NLP, and outreach.
author:
  name: "Your Name"          # TODO
  email: "you@example.com"   # TODO

# ---- URL settings -------------------------------------------------------
# CASE A — USER SITE: repository is named  USERNAME.github.io
#   url:     "https://USERNAME.github.io"
#   baseurl: ""
#
# CASE B — PROJECT SITE: repository is named anything else (e.g. "webpage")
#   url:     "https://USERNAME.github.io"
#   baseurl: "/webpage"
#
# Pick ONE. The default below is the USER SITE case.
url: "https://USERNAME.github.io"   # TODO
baseurl: ""                          # TODO (set to "/REPONAME" for a project site)

# ---- Social / contact (shown in the footer and on the home page) --------
social:
  github: "USERNAME"        # TODO  (just the handle, e.g. "akaanalkan")
  linkedin: ""              # TODO  full URL or handle
  twitter: ""              # optional
  mastodon: ""             # optional, full URL
  scholar: ""              # Google Scholar profile URL
  orcid: ""                # ORCID id, e.g. 0000-0000-0000-0000
  email: "you@example.com"  # TODO

# ---- Build settings -----------------------------------------------------
markdown: kramdown
permalink: /blog/:year/:month/:day/:title/

# Plugins below are all supported by GitHub Pages' native build.
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
  - .github
